<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🦅 GARUDA POWER</title>
<meta http-equiv="refresh" content="2;url=garuda-control-panel.html">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#f5c518;--gn:#00e676;--cyan:#00fff7;--purple:#a855f7;}
html,body{
  background:#000;color:var(--gold);
  font-family:'Share Tech Mono',monospace;
  height:100vh;width:100vw;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
body::before{content:"";position:fixed;inset:0;
  background-image:linear-gradient(rgba(245,197,24,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(245,197,24,.03) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;}
body::after{content:"";position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(245,197,24,.04),transparent 70%);
  pointer-events:none;}

.boot{text-align:center;padding:24px;max-width:360px;position:relative;z-index:1;}

.logo{font-size:76px;line-height:1;margin-bottom:18px;
  filter:drop-shadow(0 0 24px rgba(245,197,24,.7));
  animation:logoPulse 2s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.brand{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;
  letter-spacing:.15em;color:var(--gold);
  text-shadow:0 0 30px rgba(245,197,24,.5);margin-bottom:6px;}
.org{font-size:10px;letter-spacing:.3em;color:#999;font-weight:600;margin-bottom:4px;}
.ver{font-size:9px;color:#555;letter-spacing:.2em;margin-bottom:28px;}

/* AI status pills */
.ai-row{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.ai-pill{display:flex;align-items:center;gap:5px;
  border:1px solid rgba(0,255,247,.2);padding:4px 10px;font-size:9px;letter-spacing:1px;}
.ai-pill.claude{color:var(--cyan);}
.ai-pill.gemini{color:var(--purple);}
.dot{width:5px;height:5px;border-radius:50%;animation:blink 1s infinite;}
.dot.c{background:var(--cyan);box-shadow:0 0 4px var(--cyan);}
.dot.g{background:var(--purple);box-shadow:0 0 4px var(--purple);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* LOADER */
.loader-wrap{width:240px;margin:0 auto 16px;}
.loader-bar{height:3px;background:#111;border:1px solid #222;overflow:hidden;}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--g2,#c9a000),var(--gold));
  animation:load 2s ease-in-out forwards;}
@keyframes load{0%{width:0%}100%{width:100%}}

/* MARKET TICKER */
.mkt-row{display:flex;justify-content:center;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.mkt-item{font-size:9px;letter-spacing:.5px;}
.mkt-item .s{color:var(--gold);}
.mkt-item .u{color:var(--gn);}
.mkt-item .d{color:#ff3d3d;}

.status-row{display:flex;align-items:center;justify-content:center;gap:7px;
  font-size:9px;color:#555;letter-spacing:.2em;margin-bottom:20px;}
.status-dot{width:6px;height:6px;background:var(--gn);border-radius:50%;
  box-shadow:0 0 6px var(--gn);animation:blink 1s infinite;}

.fallback{font-size:10px;color:#444;margin-top:12px;}
.fallback a{color:var(--gold);text-decoration:none;border-bottom:1px solid;letter-spacing:.1em;}

.corner{position:fixed;font-size:9px;color:#222;letter-spacing:.2em;}
.corner.tl{top:14px;left:16px;}
.corner.tr{top:14px;right:16px;}
.corner.br{bottom:14px;right:16px;}
</style>
</head>
<body>
<div class="boot">
  <div class="logo">🦅</div>
  <div class="brand">GARUDA POWER</div>
  <div class="org">MY QUALITY IS MY IDENTITY</div>
  <div class="ver">v1.0.0 · NSE · BSE · F&O TERMINAL</div>

  <div class="ai-row">
    <div class="ai-pill claude"><div class="dot c"></div>CLAUDE AI</div>
    <div class="ai-pill gemini"><div class="dot g"></div>GEMINI AI</div>
  </div>

  <div class="mkt-item"><span class="s">BTC</span> <span class="u">↑1.24%</span></div>
    <div class="mkt-item"><span class="s">CRUDE</span> <span class="u">↑0.54%</span></div>
    <div class="mkt-item"><span class="s">GBP/USD</span> <span class="d">↓0.08%</span></div>
  </div>

  <div class="loader-wrap">
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <div class="status-row">
    <div class="status-dot"></div>
    <span id="statusTxt">INITIALIZING SYSTEM...</span>
  </div>

  <div class="fallback">
    Loading... <a href="garuda-control-panel.html">→ TAP TO LOGIN</a>
  </div>
</div>

<div class="corner tl">🦅 GARUDA POWER</div>
<div class="corner tr" id="cornerClock"></div>
<div class="corner br">MY QUALITY IS MY IDENTITY</div>

<script>
const steps = [
  'LOADING GARUDA POWER CORE...',
  'CONNECTING NSE · BSE FEED...',
  'CLAUDE AI + GEMINI AI ONLINE...',
  'NIFTY · BANK NIFTY · SENSEX READY...',
  'LAUNCHING GARUDA POWER...'
];
let step = 0;
const txt = document.getElementById('statusTxt');
const iv  = setInterval(() => {
  step++;
  if (step < steps.length) txt.textContent = steps[step];
  else clearInterval(iv);
}, 400);

function clock(){
  const n = new Date();
  const t = n.getUTCHours().toString().padStart(2,'0')+':'+
            n.getUTCMinutes().toString().padStart(2,'0')+':'+
            n.getUTCSeconds().toString().padStart(2,'0');
  document.getElementById('cornerClock').textContent = 'UTC '+t;
}
clock();
setInterval(clock, 1000);

setTimeout(() => { window.location.href = 'garuda-control-panel.html'; }, 2000);
</script>
</body>
</html>
